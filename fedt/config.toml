[paths]
base_path = '.'
results_folder = 'results'
logs_folder = 'logs'
scripts_path = 'scripts'
client_script_path = 'fedt/client.py'
dataset_path = 'ML-EdgeIIoT-FEDT.csv' # [CLASSIF]
#dataset_path = 'ton_iot_preprocessed.csv' # [CLASSIF]
#dataset_path = 'X-IIoTID_preprocessed.csv' # [CLASSIF]
#dataset_path = 'wustl_iiot_preprocessed.csv'  # [CLASSIF]
#dataset_path = 'cic_iot_preprocessed.csv' # [CLASSIF]
#dataset_path = 'adult_preprocessed.csv' # [CLASSIF] [Unlearning]
#dataset_path = 'bank_full.csv' # [CLASSIF] [Unlearning]
#dataset_path = 'creditcard.csv' # [CLASSIF] [Unlearning]
#dataset_path = 'kuhar_preprocessed_fft.csv'

[settings]
number_of_jobs = 12
number_of_clients = 10
number_of_rounds = 40
aggregation_strategy = "best_trees"
# Estratégias disponíveis:
# - 'random': seleciona árvores aleatoriamente
# - 'best_trees': seleciona top 50% árvores por macro-F1
# - 'threshold': seleciona árvores com MCC >= threshold
# - 'best_forests': seleciona a melhor floresta completa
# - 'class_coverage': garante cobertura por classe (recomendado para Non-IID)

[settings.sequence]
many_simulations = false
number_of_simulations = 10
aggregation_strategies = ['random', 'best_trees', 'threshold', 'best_forests', 'class_coverage']

[settings.client]
timeout = 420
debug = true
print_class_distribution = true  # [CLASSIF] exibe (true) ou não (false) a distribuição de classes por cliente

[settings.server]
IP = "0.0.0.0"
port = "50051"
mcc_threshold = 0.3 # 0.34 # [CLASSIF]
number_of_trees_in_start = 10
increase_of_trees_per_round = 10
validate_dataset_size = 1000
print_every_trees_sent = 50
timeout = 360
debug = true

# Parâmetros para estratégia 'class_coverage'
trees_per_class = 5  # número de árvores especialistas por classe
total_trees_ratio = 0.3  # proporção total de árvores a manter

[settings.classification]
# [CLASSIF] Hiperparâmetros de poda para as árvores de decisão da RandomForest
max_depth = 20  # [CLASSIF] profundidade máxima das árvores (pre-pruning)
min_samples_leaf = 1  # [CLASSIF] mínimo de amostras por folha (pre-pruning)
min_samples_split = 2  # [CLASSIF] mínimo de amostras para dividir um nó (pre-pruning)
max_features = "sqrt"  # [CLASSIF] fração de atributos considerados em cada split
ccp_alpha = 0.0  # [CLASSIF] parâmetro de poda por custo-complexidade (post-pruning)

[dataset]
train_test_split_size = 0.25
label_target = "Attack_type_6"  # [CLASS]  # opções: "Attack_label", "Attack_type_6", "Attack_type" # EdgeIIoT
#label_target = "Attack_type_10" # opções: "Attack_label", "Attack_type_10" # TON_IOT
#label_target = "Attack_type_9"  # opções: "Attack_label", "Attack_type_9", Attack_type_18 # X-IIoTID
#label_target = "Attack_type_5"  # [CLASSIF] # opções: "Attack_label", WUSTL-IIoT preprocessed
#label_target = "Attack_type_8"   # [CLASSIF] # CIC-IoT
#label_target = "income" # [CLASSIF] # adult
#label_target = "y" # [CLASSIF] # bank
#label_target = "Class" # [CLASSIF] # creditcard
#label_target = "activity" # ku-har dataset

#partition_type = "iid"
#partition_type = "non_iid"  
#partition_type = "non_iid_allclasses"  # [CLASSIF] non-IID mas garante todas as classes em todos os clientes (min de 10 amostras)
partition_type = "dominant_client"  # [CLASSIF] Um cliente dominante com X% dos dados, resto em non_iid_allclasses
non_iid_alpha = 0.3  # [CLASSIF] parâmetro alpha da Dirichlet para o particionamento non-iid
min_samples_per_class = 10  # [CLASSIF] tenta este mínimo por classe/cliente; se inviável, faz fallback automático para piso 2; se nem 2 for viável, lança erro
partition_seed = 42  # Seed para replicabilidade do particionamento (IID e NON-IID) e do train/test split

# [CLASSIF] Parâmetros para estratégia 'dominant_client'
dominant_client_id = 0  # ID do cliente que terá a maior porcentagem dos dados
dominant_client_percentage = 0.7  # Porcentagem de dados que o cliente dominante receberá (0.0 a 1.0, ex: 0.7 = 70%)

# [UNLEARNING] Parâmetros para machine unlearning
unlearning_enabled = false  # Ativa ou desativa o machine unlearning
unlearning_round = 20  # Round após o qual o cliente dominante é esquecido e bloqueado

[scripts]
network_interface = "eth0"

[shap]
# Habilitar ou desabilitar cálculo de Explainable AI (SHAP) durante a simulação
# true = calcula SHAP values e gráficos no final (pode aumentar tempo de execução)
# false = pula cálculo de SHAP (mais rápido, sem análise de explicabilidade)
xai_enabled = false

# Número máximo de classes para gerar gráficos beeswarm individuais (para economizar memória)
# Para datasets com muitas classes (ex: TON-IoT com 10), defina um valor adequado
max_classes_beeswarm = 1  # 0 = sem limite, gera para todas as classes

# Número de features a exibir no gráfico SHAP (padrão SHAP: 20)
# O gráfico mostra apenas as N features mais importantes
max_display_features = 20  # 0 = todas as features